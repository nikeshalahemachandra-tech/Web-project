	<style>
	{
	   padding:0;
	   margin:0;
	  }
    body{
        background-color:#fff;
	}
h1{
	color:#423780;
}	
.items {
	display:grid;
	grid-template-columns:repeat(3, 1fr);
	padding:40px 30px;
	grid-column-gap:30px;
	grid-row-gap:50px;
		
}	
.item img{
	transition: 0.2s ease;
	cursor:pointer;
	object-fit:cover;
}
.item img:hover{
	transform:scale(1.04);
}
.item h4{
    padding:3px;
	text-align:pointer;
}	

	
	
.item button{
	padding:5px 30px;
	border:none;
	outline:none;
	background-color:green;
	color:#fff;
	cursor:pointer;
	border-radius:4px;
	margin:0 auto;
	transition:0.2s all;
}
.item button:hover{
	transform:scale(1.04);
}
@media screen and (max-width:1000px){
	.items{
		grid-template-columns:repeat(2, 1fr);
	}
}
@media screen and (max-width:768px){
	.items{
		grid-template-columns:repeat(1, 1fr);
	}
}
	
	
	
	</style>
