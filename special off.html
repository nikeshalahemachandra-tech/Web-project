<!DOCTYPE html>
<html>
	<head>
	
	<title>Special Offers</title>
	
	</head>
	
	<style>
	{
	   padding:0;
	   margin:0;
	  }
    body{
        background-color:#fff;
	}
	h1{
	color:#423780;
    }	
	h2 {
	  color:#82C235;
	  font-size:30px;
	  font-family:sans-serif;
	}
	h2.double{
	     border-style:double;
		 color:#7A1B2D;
	}
	.items {
	display:grid;
	grid-template-columns:repeat(3, 1fr);
	padding:40px 30px;
	grid-column-gap:40px;
	grid-row-gap:50px;
		
}	
   .item img{
	transition: 0.2s ease;
	cursor:pointer;
	object-fit:cover;
}
	.item img:hover{
	transform:scale(1.04);
}
	.item h4{
    padding:3px;
	text-align:pointer;
}	

	
	.item button{
	padding:5px 30px;
	border:none;
	outline:none;
	background-color:green;
	color:#fff;
	cursor:pointer;
	border-radius:4px;
	margin:0 auto;
	transition:0.2s all;
}
.item button:hover{
	transform:scale(1.04);
}
@media screen and (max-width:1000px){
	.items{
		grid-template-columns:repeat(2, 1fr);
	}
}
@media screen and (max-width:768px){
	.items{
		grid-template-columns:repeat(1, 1fr);
	}
}
	h3 {
	  color:#82C235;
	  font-size:30px;
	  font-family:sans-serif;
	}
	h3.double{
	     border-style:double;
		 color:#7A1B2D;
	}	
	</style>

	<center>

	</center>

       </div>  	

         <div class="item">
	        <img width="215" height="300px"src="images/s2.webp">

		 <div class="item">

         <div class="item">

</html>
